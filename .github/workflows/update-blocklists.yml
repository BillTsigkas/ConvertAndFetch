name: Weekly update blocklists

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write

env:
  # Opt into Node.js 24 for JavaScript actions now (prevents the deprecation warning)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # ensure the action leaves credentials so git push can use GITHUB_TOKEN
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Make converter executable
        run: chmod +x convert-and-fetch.py

      - name: Run converter
        run: python3 convert-and-fetch.py

      - name: Sort and dedupe outputs
        run: |
          for f in *.txt; do
            if [ -f "$f" ] && [ "$f" != "whitelist.txt" ]; then
              sort -u "$f" -o "$f"
            fi
          done

      - name: Generate README with table of raw links
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name || 'main' }}
        run: |
          chmod +x generate_readme.py || true
          python3 generate_readme.py


      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add README.md *.txt changelog.txt || true
          # if there are no staged changes, exit cleanly
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Weekly update: convert upstream wildcard lists ($(date -u +%Y-%m-%d))"
          git push
