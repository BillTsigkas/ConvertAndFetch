name: Weekly update blocklists

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write

env:
  # Opt into Node.js 24 for JavaScript actions now (prevents the deprecation warning)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Prepare workspace
        run: |
          # ensure scripts are executable and a clean generated/ folder exists
          chmod +x convert-and-fetch.py || true
          chmod +x generate_readme.py || true
          rm -f *_asterisk.txt || true
          rm -rf generated || true
          mkdir -p generated

      - name: Run converter
        run: python3 convert-and-fetch.py

      - name: Sort and dedupe outputs in generated
        run: |
          for f in generated/*.txt; do
            if [ -f "$f" ]; then
              sort -u "$f" -o "$f"
            fi
          done

      - name: List generated files (debug)
        run: |
          echo "=== generated files ==="
          ls -la generated || true
          echo "=== sample heads ==="
          for f in generated/*.txt; do
            echo "---- $f ----"
            head -n 5 "$f" || true
          done

      - name: Generate README with table of raw links
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name || 'main' }}
        run: |
          python3 generate_readme.py

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add README.md generated/*.txt changelog.txt || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Weekly update: convert upstream wildcard lists ($(date -u +%Y-%m-%d))"
          git push
